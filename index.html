<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tulipanes para ti 🌷</title>
  <style>
    body {
      background: linear-gradient(#fff7cc, #ffe680);
      text-align: center;
      font-family: 'Arial', sans-serif;
      padding-top: 50px;
    }
    h1 {
      color: #ffcc00;
      font-size: 42px;
    }
    p {
      font-size: 20px;
      color: #6b5e00;
    }
    .tulipanes {
      font-size: 50px;
      margin-top: 20px;
      animation: flotar 2s infinite alternate;
    }
    @keyframes flotar {
      from { transform: translateY(0px); }
      to { transform: translateY(-15px); }
    }
    button {
      margin-top: 30px;
      padding: 10px 20px;
      border: none;
      background-color: #ffd633;
      color: #5a4d00;
      font-size: 16px;
      border-radius: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Para ti 🌷💛</h1>
  <p>Unos tulipanes amarillos para recordarte lo especial que eres</p>

  <div class="tulipanes" id="flores">🌷🌷🌷</div>

  <button onclick="masTulipanes()">Haz clic 🌼</button>

  <script>
    function masTulipanes() {
      document.getElementById("flores").innerHTML += " 🌷🌷";
    }
  </script>

</body>
</html>
