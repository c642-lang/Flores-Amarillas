<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti 🌼</title>
  <style>
    body {
      background: linear-gradient(#fff7cc, #ffe680);
      text-align: center;
      font-family: Arial, sans-serif;
      padding-top: 40px;
    }
    h1 {
      color: #ffcc00;
    }
    .tree {
      font-size: 30px;
      line-height: 30px;
      margin-top: 30px;
      animation: sway 3s infinite alternate;
    }
    @keyframes sway {
      from { transform: rotate(-2deg); }
      to { transform: rotate(2deg); }
    }
  </style>
</head>
<body>

  <h1>Para ti 💛</h1>

  <div class="tree">
        🌼<br>
       🌼🌼🌼<br>
      🌼🌼🌼🌼🌼<br>
     🌼🌼🌼🌼🌼🌼🌼<br>
    🌼🌼🌼🌼🌼🌼🌼🌼🌼<br>
       🌼🌼🌼<br>
       🌼🌼🌼<br>
        🌼🌼
  </div>

  <p>Un arbolito de flores para ti 🌼</p>

</body>
</html>
