<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti 🌻</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #fff8dc;
      font-family: Arial, sans-serif;
    }

    .girasol {
      position: absolute;
      font-size: 30px;
      animation: caer linear infinite;
    }

    @keyframes caer {
      from {
        transform: translateY(-10vh);
      }
      to {
        transform: translateY(110vh);
      }
    }

    h1 {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 40%;
      color: #f4b400;
      font-size: 40px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <h1>Para ti 🌻💛</h1>

  <script>
    function crearGirasol() {
      const girasol = document.createElement("div");
      girasol.classList.add("girasol");
      girasol.innerHTML = "🌻";

      girasol.style.left = Math.random() * 100 + "vw";
      girasol.style.animationDuration = (3 + Math.random() * 5) + "s";
      girasol.style.fontSize = (20 + Math.random() * 30) + "px";

      document.body.appendChild(girasol);

      setTimeout(() => {
        girasol.remove();
      }, 8000);
    }

    setInterval(crearGirasol, 200);
  </script>

</body>
</html>
